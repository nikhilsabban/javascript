<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker | Manage Your Wealth</title>
    <meta name="description" content="A modern, responsive Expense Tracker built with Vanilla JavaScript. Track your income and expenses with ease.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- CSS Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <!-- Custom Notification Banner -->
    <div id="notification" class="notification"></div>

    <main class="container">
        <header>
            <h1>Expense Tracker</h1>
            <p class="subtitle">Smartly monitor your finances</p>
        </header>

        <!-- Summary Section -->
        <section class="summary-container">
            <div class="card balance-card">
                <h3>Your Balance</h3>
                <h2 id="balance-amount">₹0.00</h2>
                <!-- Feature 4: Visualization Bar -->
                <div class="viz-container">
                    <div class="viz-bar">
                        <div id="expense-progress" class="progress"></div>
                    </div>
                    <p id="viz-text">Expense is 0% of Income</p>
                </div>
            </div>
            <div class="summary-details">
                <div class="card income-card">
                    <h4>Income</h4>
                    <p id="total-income">+₹0.00</p>
                </div>
                <div class="card expense-card">
                    <h4>Expense</h4>
                    <p id="total-expense">-₹0.00</p>
                </div>
            </div>
        </section>

        <!-- Form Section -->
        <section class="form-container card">
            <h3>Add New Transaction</h3>
            <form id="transaction-form">
                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" placeholder="e.g., Salary, Rent, Groceries" autocomplete="off">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="amount">Amount</label>
                        <input type="number" id="amount" step="0.01" placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label for="type">Type</label>
                        <select id="type">
                            <option value="income">Income</option>
                            <option value="expense">Expense</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category">
                            <option value="💰 Salary">Salary</option>
                            <option value="🍔 Food">Food</option>
                            <option value="🏠 Rent">Rent</option>
                            <option value="🚗 Transport">Transport</option>
                            <option value="🛍️ Shopping">Shopping</option>
                            <option value="✨ Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date">
                    </div>
                </div>
                <button type="submit" id="add-btn" class="primary-btn">Add Transaction</button>
                <input type="hidden" id="edit-id" value="">
            </form>
        </section>

        <!-- History Section -->
        <section class="history-container">
            <div class="history-header">
                <h3>History</h3>
                <div class="header-actions">
                    <div class="filter-controls">
                        <button class="filter-btn active" data-filter="all">All</button>
                        <button class="filter-btn" data-filter="income">Income</button>
                        <button class="filter-btn" data-filter="expense">Expense</button>
                    </div>
                    <button id="reset-btn" class="reset-btn-ui">Reset All</button>
                </div>
            </div>
            <ul id="transaction-list" class="list">
                <!-- Transactions will be injected here -->
                <li class="empty-state">No transactions yet. Start by adding one!</li>
            </ul>
        </section>
    </main>

    <!-- Script -->
    <script src="script.js"></script>
</body>
</html>
