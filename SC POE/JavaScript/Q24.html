<!-- 24. Write a JavaScript program that takes marks as input and displays grade 
based on conditions.  -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let marks= Number(prompt("Enter marks: "));

        if(marks >= 75)
    {
        alert("Grade A")
    }
    else if(marks >= 50){
        alert("Grade B")
    }
    else{
        alert("Grade C")
    }
    </script>
</body>
</html>
